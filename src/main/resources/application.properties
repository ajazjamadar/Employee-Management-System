# Application Configuration
app.name=Employee Management System
app.version=3.0.0
app.description=SOLID-compliant Employee Management System

# Logging Configuration
logging.level.root=INFO
logging.level.com.company.employeemanagement=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Database Configuration (for future use)
# db.url=jdbc:mysql://localhost:3306/employee_db
# db.username=root
# db.password=password
# db.driver=com.mysql.cj.jdbc.Driver

# Application Settings
app.max.employees=1000
app.default.department=General
app.tax.rate=0.15

# Feature Flags
feature.reports.enabled=true
feature.export.enabled=true
feature.notifications.enabled=false
